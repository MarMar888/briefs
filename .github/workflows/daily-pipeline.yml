name: Live Ingest Loop

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        # Per-vertical flags: minnesota runs the firehose with NO --keywords (the name
        # filter can't apply), its own limits, and more site workers. outdoor/construction
        # keep their original behavior (--keywords, --domain-limit 3000 = run.py default).
        include:
          - vertical: outdoor
            keywords_flag: "--keywords"
            domain_limit: "3000"
            geo_limit: "2000"
            site_limit: "200"
            site_workers: "8"
          - vertical: construction
            keywords_flag: "--keywords"
            domain_limit: "3000"
            geo_limit: "2000"
            site_limit: "200"
            site_workers: "8"
          - vertical: minnesota
            keywords_flag: ""
            domain_limit: "0"
            geo_limit: "8000"
            site_limit: "4000"
            site_workers: "16"
    # Per-vertical group: Live Ingest serializes against Backfill (both do
    # geo+site scanning on the same queue), but not Lead Audit (enrichment-only,
    # reads a different slice of the DB and doesn't conflict with scanning).
    # The two markets scan in parallel and one failing never fails the other.
    concurrency:
      group: scan-${{ matrix.vertical }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run domain pipeline
        run: >
          python run.py --domains-only --domain-source domainsmonitor
          ${{ matrix.keywords_flag }}
          --domain-limit ${{ matrix.domain_limit }}
          --geo-limit ${{ matrix.geo_limit }}
          --site-limit ${{ matrix.site_limit }}
          --vertical ${{ matrix.vertical }}
        env:
          SITE_WORKERS: ${{ matrix.site_workers }}
          # Stop the pipeline cleanly ~15 min before the 300-min hard cap so it commits
          # finished work and exits instead of being killed mid-batch with stalled
          # workers burning the tail (the June failure mode).
          MAX_RUNTIME_MINUTES: "285"
          DOMAIN_DB_PATH: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DOMAINS_MONITOR_TOKEN: ${{ secrets.DOMAINS_MONITOR_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          # Optional off-site search for the deep-search audit (no-ops if unset)
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
