name: Daily Domain Pipeline

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run domain pipeline
        run: python run.py --domains-only --domain-source domainsmonitor --keywords --site-limit 200
        env:
          DOMAIN_DB_PATH: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          DOMAINS_MONITOR_TOKEN: ${{ secrets.DOMAINS_MONITOR_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          FIRECRAWL_TIMEOUT_SECONDS: "15"
