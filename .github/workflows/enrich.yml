name: Lead Audit

on:
  schedule:
    # Runs at 12 PM UTC daily (6 AM CST) — 1 hour after the daily pipeline
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max domains to enrich this run (0 = no limit)"
        required: false
        default: "0"
      reaudit:
        description: "Re-audit already-audited leads: none | stale (not on current version) | all"
        required: false
        default: "none"

# Shared with Live Ingest Loop + Backfill Queue so the three never run at once.
concurrency:
  group: lead-pipeline
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Enrich matched domains
        run: |
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          REAUDIT="${{ github.event.inputs.reaudit || 'none' }}"
          FLAG=""
          [ "$REAUDIT" != "none" ] && FLAG="--reaudit $REAUDIT"
          echo "[enrich] Running enrichment, limit=$LIMIT, reaudit=$REAUDIT"
          python enricher.py --limit "$LIMIT" $FLAG
        env:
          DOMAIN_DB_PATH: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FIRECRAWL_TIMEOUT_SECONDS: "15"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional off-site search (no-ops if unset)
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
