name: Backfill Queue

on:
  schedule:
    # Runs every 4 hours — chips through site_pending queue until empty
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      site_limit:
        description: "Max domains to classify this run (0 = no limit)"
        required: false
        default: "1000"
      geo_limit:
        description: "Max new/geo_pending domains to geo-check this run (0 = no limit)"
        required: false
        default: "0"

# Shared with Live Ingest Loop + Lead Audit so the three never run at once.
concurrency:
  group: lead-pipeline
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run geo + site classification batch
        run: |
          LIMIT="${{ github.event.inputs.site_limit || '1000' }}"
          GEO_LIMIT="${{ github.event.inputs.geo_limit || '0' }}"
          echo "[backfill] Running geo + site classification, geo-limit=$GEO_LIMIT, site-limit=$LIMIT"
          python run.py \
            --domains-only \
            --skip-domain-import \
            --domain-source domainsmonitor-file \
            --keywords \
            --geo-limit "$GEO_LIMIT" \
            --site-limit "$LIMIT"
        env:
          DOMAIN_DB_PATH: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FIRECRAWL_TIMEOUT_SECONDS: "15"
