name: Backfill Queue

on:
  schedule:
    # Runs every 4 hours — chips through geo + site_pending queue until empty
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      site_limit:
        description: "Max domains to classify this run (0 = no limit)"
        required: false
        default: "1000"
      geo_limit:
        description: "Max new/geo_pending domains to geo-check this run (0 = no limit)"
        required: false
        default: "1000"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        # minnesota MUST run without --keywords (it has none): if it inherited --keywords
        # the geo phase would reject the entire MN queue as "no keyword match in domain
        # name". Per-vertical flags + a profile-level backstop both enforce this.
        include:
          - vertical: outdoor
            keywords_flag: "--keywords"
            geo_limit: "1000"
            site_limit: "1000"
            site_workers: "8"
          - vertical: construction
            keywords_flag: "--keywords"
            geo_limit: "1000"
            site_limit: "1000"
            site_workers: "8"
          - vertical: minnesota
            keywords_flag: ""
            geo_limit: "6000"
            site_limit: "5000"
            site_workers: "16"
    # Per-vertical group so each market's backfill serializes only against its own
    # Live Ingest (both do geo+site scanning on the same queue); Lead Audit runs
    # independently in its own group. The two markets drain their queues in parallel.
    concurrency:
      group: scan-${{ matrix.vertical }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run geo + site classification batch
        run: |
          LIMIT="${{ github.event.inputs.site_limit || matrix.site_limit }}"
          GEO_LIMIT="${{ github.event.inputs.geo_limit || matrix.geo_limit }}"
          echo "[backfill] vertical=${{ matrix.vertical }} geo-limit=$GEO_LIMIT site-limit=$LIMIT"
          export HEARTBEAT_FILE="$RUNNER_TEMP/heartbeat-${{ matrix.vertical }}"
          touch "$HEARTBEAT_FILE"
          python run.py \
            --domains-only \
            --skip-domain-import \
            --domain-source domainsmonitor-file \
            ${{ matrix.keywords_flag }} \
            --geo-limit "$GEO_LIMIT" \
            --site-limit "$LIMIT" \
            --vertical ${{ matrix.vertical }} &
          PY_PID=$!

          # OS-level backstop for the in-process watchdog (domain_store.start_watchdog).
          # That watchdog is a Python thread, which needs the GIL to notice a stall — but
          # 2026-07-06 showed a stuck libsql_experimental (Rust/PyO3) call can hold the GIL
          # forever, starving every thread including the watchdog itself. This loop runs as
          # a separate OS process, so it kills the run on staleness even when Python is
          # completely wedged.
          (
            STALL_LIMIT_SECONDS=1320  # 22min: a bit past the in-process 20min watchdog
            while kill -0 "$PY_PID" 2>/dev/null; do
              sleep 30
              last=$(stat -c %Y "$HEARTBEAT_FILE" 2>/dev/null || echo 0)
              now=$(date +%s)
              if [ $((now - last)) -ge "$STALL_LIMIT_SECONDS" ]; then
                echo "[watchdog-os] no heartbeat for ${STALL_LIMIT_SECONDS}s — killing stuck pipeline (pid $PY_PID)"
                kill -9 "$PY_PID" 2>/dev/null
                break
              fi
            done
          ) &
          WATCHER_PID=$!

          wait "$PY_PID"
          STATUS=$?
          kill "$WATCHER_PID" 2>/dev/null || true
          exit "$STATUS"
        env:
          SITE_WORKERS: ${{ matrix.site_workers }}
          # Exit cleanly ~12 min before the 100-min hard cap (commit progress, abandon
          # stalled/queued work) so a stuck batch never burns the runner to the cap.
          MAX_RUNTIME_MINUTES: "88"
          DOMAIN_DB_PATH: ${{ secrets.TURSO_DB_URL }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
